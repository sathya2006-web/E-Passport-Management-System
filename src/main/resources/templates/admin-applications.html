<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Applications</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-4">
    <div class="row mb-4">

        <div class="col">
            <div class="card text-center">
                <div class="card-body">
                    <h4 th:text="${total}"></h4>
                    <p>Total</p>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card text-center">
                <div class="card-body">
                    <h4 th:text="${applied}"></h4>
                    <p>Applied</p>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card text-center">
                <div class="card-body">
                    <h4 th:text="${verification}"></h4>
                    <p>Verification</p>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card text-center">
                <div class="card-body">
                    <h4 th:text="${approved}"></h4>
                    <p>Approved</p>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card text-center">
                <div class="card-body">
                    <h4 th:text="${rejected}"></h4>
                    <p>Rejected</p>
                </div>
            </div>
        </div>

    </div>

    <h2>Passport Applications</h2>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
        <tr>
            <th>Passport Number</th>
            <th>Name</th>
            <th>Email</th>
            <th>Appointment Date</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="app : ${applications}">

            <td th:text="${app.passportNumber}"></td>

            <td th:text="${app.name}"></td>

            <td th:text="${app.email}"></td>

            <td th:text="${app.appointmentDate}"></td>

            <td>
                <span class="badge"
                      th:classappend="
                      ${app.status.name() == 'APPLIED'} ? ' bg-secondary' :
                      (${app.status.name() == 'UNDER_VERIFICATION'} ? ' bg-warning' :
                      (${app.status.name() == 'APPROVED'} ? ' bg-success' :
                      ' bg-danger'))"
                      th:text="${app.status}">
                </span>
            </td>

            <td>

                <a th:href="@{/admin/applications/{id}/verify(id=${app.passportNumber})}"
                   class="btn btn-warning btn-sm">
                    Verify
                </a>

                <a th:href="@{/admin/applications/{id}/approve(id=${app.passportNumber})}"
                   class="btn btn-success btn-sm">
                    Approve
                </a>

                <a th:href="@{/admin/applications/{id}/reject(id=${app.passportNumber})}"
                   class="btn btn-danger btn-sm">
                    Reject
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
