<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Passport Application Details</title>

    <link rel="icon"
          href="https://www.pngitem.com/pimgs/m/419-4199332_indian-passport-logo-png-transparent-png.png"
          type="image/x-icon">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>Passport Application Details</h3>
        </div>

        <div class="card-body">

            <p>
                <strong>Passport Number:</strong>
                <span th:text="${details.passportNumber}"></span>
            </p>

            <p>
                <strong>Name:</strong>
                <span th:text="${details.name}"></span>
            </p>

            <p>
                <strong>Email:</strong>
                <span th:text="${details.email}"></span>
            </p>

            <p th:if="${details.citizen != null}">
                <strong>Registration Number:</strong>
                <span th:text="${details.citizen.registrationNumber}"></span>
            </p>

            <p>
                <strong>Appointment Date:</strong>
                <span th:text="${details.appointmentDate}"></span>
            </p>

            <p>
                <strong>Application Status:</strong>

                <span class="badge"
                      th:classappend="
                        ${details.status.name() == 'APPLIED'} ? ' bg-secondary' :
                        (${details.status.name() == 'UNDER_VERIFICATION'} ? ' bg-warning text-dark' :
                        (${details.status.name() == 'APPROVED'} ? ' bg-success' :
                        ' bg-danger'))"
                      th:text="${details.status}">
                </span>

            </p>

        </div>

        <div class="card-footer d-flex justify-content-between">

            <a href="/user"
               class="btn btn-primary">
                Back to Dashboard
            </a>

            <button class="btn btn-success"
                    onclick="window.print()">
                Print Application
            </button>

        </div>

    </div>

</div>

</body>

</html>
